<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: 'Oswald', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3d59, #2a7f62);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #ffffff;
            border-radius: 14px;
            padding: 35px 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        }

        .login-card h3 {
            color: #1e3d59;
            font-weight: 700;
            text-align: center;
        }

        .login-card p {
            color: #2a7f62;
            font-size: 14px;
            text-align: center;
        }

        .form-label {
            font-weight: 500;
            color: #1e3d59;
        }

        .input-group {
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            transition: 0.2s;
        }

        .input-group-text {
            background: #eaf6ff;
            border: none;
            color: #1e3d59;
            padding: 0 14px;
        }

        .form-control {
            border: none;
            padding: 12px;
        }

        .form-control:focus {
            box-shadow: none;
        }

        .input-group:has(input:focus) {
            border: 2px solid #2a7f62;
            box-shadow: 0 0 0 0.15rem rgba(42,127,98,0.25);
        }

        .btn-login {
            background: linear-gradient(135deg, #1e3d59, #3a6ea5);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 12px;
            border-radius: 8px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            color: #fff !important;
        }

        .back-link {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }

        .back-link a {
            color: #2a7f62;
            text-decoration: none;
        }

        .error-text {
            color: #f00f !important;
            font-size: 13px;
            margin-top: 5px;
            text-align:left !important;
            display: none;
        }
    </style>
</head>
<body>
    
    <div class="login-card">
        <div class="text-center mb-4">
            <h3>Reset Password</h3>
            <p>Smt. K. B. Parekh College of Computer Science</p>
        </div>

        <form id="resetForm">

            <!-- New Password -->
                <div class="mb-3">
                      <label for="newPassword" class="form-label">
                         New Password
                       </label>

                    <div class="input-group">
                         <span class="input-group-text">
                              <i class="fas fa-lock"></i>
                         </span>

                        <input type="password"
                            id="newPassword"
                            class="form-control"
                             placeholder="Enter new password">
                     </div>

                              <p id="newPasswordError" class="error-text"></p>
                </div>
    

             <!-- Confirm Password -->
                 <div class="mb-3">
                     <label for="confirmPassword" class="form-label">
                      Confirm Password
                     </label>

                    <div class="input-group">
                         <span class="input-group-text">
                             <i class="fas fa-lock"></i>
                         </span>

                         <input type="password"
                               id="confirmPassword"
                             class="form-control"
                                 placeholder="Confirm new password">
                     </div>

                         <p id="confirmPasswordError" class="error-text"></p>
                   </div>


    <!-- Submit Button -->
    <div class="d-grid">
        <button type="submit" class="btn btn-login">
            Reset Password
        </button>
    </div>


    <!-- Back Link -->
    <div class="back-link">
        <a href="Admin_login.html">
            <i class="fas fa-arrow-left"></i> Back to Login
        </a>
    </div>

</form>
    </div>
    
<script>
    // Get Email & Token from URL
    console.log("FULL URL:", window.location.href);
const params = new URLSearchParams(window.location.search);

const email = params.get("email");
const token = params.get("token");

// Debug logs
console.log(" Email from URL:", email);
console.log(" Token from URL:", token);




// Reset Password Form
const form = document.getElementById("resetForm");

form.addEventListener("submit", async function (e) {
    e.preventDefault();

    const newPasswordInput = document.getElementById("newPassword");
    const confirmPasswordInput = document.getElementById("confirmPassword");

    const newPasswordError = document.getElementById("newPasswordError");
    const confirmPasswordError = document.getElementById("confirmPasswordError");

    // Clear errors
    newPasswordError.style.display = "none";
    confirmPasswordError.style.display = "none";

    const newPassword = newPasswordInput.value.trim();
    const confirmPassword = confirmPasswordInput.value.trim();


    // =============================
    // Validation
    // =============================
    if (newPassword === "") {
        newPasswordError.innerText = "New password is required";
        newPasswordError.style.display = "block";
        return;
    }

    if (newPassword.length < 6) {
        newPasswordError.innerText = "Password must be at least 6 characters";
        newPasswordError.style.display = "block";
        return;
    }

    if (confirmPassword === "") {
        confirmPasswordError.innerText = "Confirm password is required";
        confirmPasswordError.style.display = "block";
        return;
    }

    if (newPassword !== confirmPassword) {
        confirmPasswordError.innerText = "Passwords do not match";
        confirmPasswordError.style.display = "block";
        return;
    }


    
    // DEBUG BEFORE API CALL
   
    console.log("Sending to API:", {
        email: email,
        resetToken: token,
        newPassword: newPassword
    });


   
    // CALL RESET PASSWORD API
    
    try {
        const response = await fetch("https://localhost:7121/api/Login/reset-password", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email,          
                resetToken: token,     
                newPassword: newPassword
            })
        });

        console.log(" Response status:", response.status);

        const result = await response.json();
        console.log(" API Response:", result);

        if (response.ok) {
            alert("Password reset successful!");
            window.location.href = "Admin_login.html";
        } else {
            alert(result.message || " Password reset failed");
        }

    } catch (error) {
        console.error(" Error:", error);
        alert("Server error. Please try again.");
    }
});
</script>



</body>
</html>
