<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notice: Student Council Elections 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Oswald',sans-serif;
            background: #f0f8ff;
            margin: 0;
        }

        .page-header {
            background: linear-gradient(135deg,#1e3d59,#3a6ea5);
            color: #fff;
            padding: 50px 20px;
            text-align: center;
        }

            .page-header h1 {
                font-weight: 700;
                margin-bottom: 8px;
            }

            .page-header p {
                color: white !important;
            }

        .notice-wrapper {
            max-width: 900px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .notice-detail-card {
            background-color: #e6f2f1;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

            .notice-detail-card h2 {
                color: #1e3d59;
                font-weight: 600;
                margin-bottom: 15px;
            }

            .notice-detail-card p {
                color: #2a7f62;
                font-size: 1.05rem;
                line-height: 1.7;
            }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 22px;
            background: linear-gradient(135deg,#1e3d59,#3a6ea5);
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            font-size: .95rem;
            transition: transform .2s,box-shadow .2s;
        }

            .back-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 15px rgba(0,0,0,0.2);
                color: white !important;
                text-decoration: none;
            }
    </style>
</head>
<body>
    <div class="page-header">
        <h1>Notice Details</h1>
        <p>Official College Announcement</p>
    </div>
    <div class="notice-wrapper">
        <div class="notice-detail-card">
            <h2>Student Council Elections 2026</h2>
            <p>Student Council elections for the academic year 2026 will be conducted next month. Eligible students are encouraged to submit their nominations within the stipulated time.</p>
            <a href="index.html" class="back-btn">← Back to Notice Board</a>
        </div>
    </div>
    <div id="footer-container"></div>
    <script src="script.js"></script>
</body>
</html>
