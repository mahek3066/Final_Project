<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Time Table - Student View</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="TimeTable.css">
</head>
<body>
    <div id="header-container"></div>
    <div class="head text-center position-relative">
        <div class="header">
            <h1>Time Table</h1>
            <a href="TTupload.html" class="add-btn text-decoration-none">+Add Time Table</a>
        </div>

        <div class="container mt-5">
            <h2 class="section-title">Available Time Tables</h2>

            <div class="table-responsive">
                <table id="timetableList" class="table table-hover shadow-sm">
                    <thead>
                        <tr>
                            <th>Time Table Name</th>
                            <th>Upload Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="timetableBody">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="modal fade" id="viewModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 id="modalTitle" class="modal-title fs-5 w-100 text-center"></h2>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" onclick="closeModal()"></button>
                    </div>
                    <div class="modal-body">
                        <iframe id="pdfViewer" src="" style="width:100%; height:450px; border:none;"></iframe>
                    </div>
                    <div class="modal-footer d-flex justify-content-center">
                        <button id="modalDownloadBtn" class="download-btn border-0" onclick="downloadFromModal()">
                            <i class="fas fa-download"></i> Download Time Table
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <!-- Footer will load here -->
        <div id="footer-container"></div>
        <!-- JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        <script>
            let timetables = JSON.parse(localStorage.getItem('timetables')) || [];
            let bsModal;

            document.addEventListener('DOMContentLoaded', function () {
                // Bootstrap Modal Initialize
                bsModal = new bootstrap.Modal(document.getElementById('viewModal'));
                loadTimetables();
            });

            function loadTimetables() {
                const tbody = document.getElementById('timetableBody');
                const table = document.getElementById('timetableList');

                tbody.innerHTML = '';

                if (timetables.length === 0) {
                    table.style.display = 'none';
                    tbody.innerHTML = '<tr><td colspan="3" class="no-data">No timetables available</td></tr>';
                    return;
                }

                table.style.display = 'table';

                timetables.forEach(function (timetable) {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                                        <td class="align-middle">${timetable.name}</td>
                                        <td class="align-middle">${timetable.date}</td>
                                        <td class="align-middle">
                                            <div class="action-buttons">
                                                <button class="view-btn" onclick="viewTimetable(${timetable.id})"><i class="fas fa-eye"></i>View</button>
                                                <button class="download-btn" onclick="downloadTimetable(${timetable.id})">
                                                    <i class="fas fa-download"></i> Download
                                                </button>
                                            </div>
                                        </td>
                                    `;
                    tbody.appendChild(row);
                });
            }

            function viewTimetable(id) {
                const timetable = timetables.find(t => t.id === id);
                if (!timetable) return;

                document.getElementById('modalTitle').textContent = timetable.name;
                document.getElementById('pdfViewer').src = timetable.pdf;
                document.getElementById('modalDownloadBtn').setAttribute('data-id', id);
                bsModal.show(); // Open Bootstrap Modal
            }

            function downloadTimetable(id) {
                const timetable = timetables.find(t => t.id === id);
                if (!timetable || !timetable.pdf) {
                    alert('No timetable available for download');
                    return;
                }

                const link = document.createElement('a');
                link.href = timetable.pdf;
                link.download = timetable.name.replace(/\s+/g, '_') + '.pdf';

                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }

            function downloadFromModal() {
                const id = parseInt(document.getElementById('modalDownloadBtn').getAttribute('data-id'));
                downloadTimetable(id);
            }

            function closeModal() {
                document.getElementById('pdfViewer').src = "";
                if (bsModal) bsModal.hide(); // Close Bootstrap Modal
            }
        </script>
</body>
</html>
