<h3 class="mb-4">Dashboard Overview</h3>

<div class="row g-4">

    <div class="col-md-3">

        <div class="card p-3 text-center">

            <div class="icon-box">
                <i class="fa fa-image"></i>
            </div>

            <h4 id="photoCount">0</h4>
            <p>Total User</p>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card p-3 text-center">

            <div class="icon-box">
                <i class="fa fa-users"></i>
            </div>

            <h4 id="userCount">0</h4>
            <p>Total Students</p>

        </div>

    </div>

</div>

<div class="card mt-5">

    <div class="card-header bg-white">
        <h5>Recent Activity</h5>
    </div>

    <div class="card-body">

        <table class="table table-striped">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="activityTable"></tbody>

        </table>

    </div>

</div>
