<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>Admin Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link href="../css/profile.css" rel="stylesheet" />

</head>

<body>

    <div class="container mt-4">

        <h4 class="mb-4">Profile</h4>

        <!-- PROFILE HEADER -->

        <div class="card p-4 mb-4">
haa
            <div class="row align-items-center">

                <div class="col-md-6 d-flex align-items-center">

                    <img id="profileImg" src="https://i.pravatar.cc/100" class="profile-img me-3">

                    <div>
                        <h5 id="name">Musharof Chowdury</h5>
                        <p id="role">Team Manager | Arizona, United States</p>
                    </div>

                </div>

                <div class="col-md-6 text-end">

                    <button class="icon-btn"><i class="fab fa-facebook-f"></i></button>
                    <button class="icon-btn"><i class="fab fa-x-twitter"></i></button>
                    <button class="icon-btn"><i class="fab fa-linkedin-in"></i></button>
                    <button class="icon-btn"><i class="fab fa-instagram"></i></button>

                    <button class="btn btn-light" data-bs-toggle="modal" data-bs-target="#editProfile">
                        <i class="fa fa-pen"></i> Edit
                    </button>

                </div>

            </div>

        </div>


        <!-- PERSONAL INFO -->

        <div class="card p-4 mb-4">

            <div class="d-flex justify-content-between mb-3">

                <h5>Personal Information</h5>

                <button class="btn btn-light" data-bs-toggle="modal" data-bs-target="#editProfile">
                    <i class="fa fa-pen"></i> Edit
                </button>

            </div>

            <div class="row">

                <div class="col-md-6">
                    <label>First Name</label>
                    <p id="firstName"></p>
                </div>

                <div class="col-md-6">
                    <label>Last Name</label>
                    <p id="lastName"></p>
                </div>

                <div class="col-md-6">
                    <label>Email</label>
                    <p id="email"></p>
                </div>

                <div class="col-md-6">
                    <label>Phone</label>
                    <p id="phone"></p>
                </div>

                <div class="col-md-12">
                    <label>Bio</label>
                    <p id="bio">Team Manager</p>
                </div>

            </div>

        </div>


        <!-- ADDRESS -->

        <div class="card p-4">

            <div class="d-flex justify-content-between mb-3">

                <h5>Address</h5>

                <button class="btn btn-light" data-bs-toggle="modal" data-bs-target="#editProfile">
                    <i class="fa fa-pen"></i> Edit
                </button>

            </div>

            <div class="row">

                

                <div class="col-md-6">
                    <label>City/State</label>
                    <p id="city">Arizona</p>
                </div>


            </div>

        </div>

    </div>


    <!-- EDIT PROFILE MODAL -->

    <div class="modal fade" id="editProfile">

        <div class="modal-dialog modal-lg">

            <div class="modal-content">

                <div class="modal-header">
                    <h5>Edit Profile</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <input type="text" id="editFirstName" class="form-control" placeholder="First Name">
                        </div>

                        <div class="col-md-6 mb-3">
                            <input type="text" id="editLastName" class="form-control" placeholder="Last Name">
                        </div>

                        <div class="col-md-6 mb-3">
                            <input type="email" id="editEmail" class="form-control" placeholder="Email">
                        </div>

                        <div class="col-md-6 mb-3">
                            <input type="text" id="editPhone" class="form-control" placeholder="Phone">
                        </div>

                        <div class="col-md-12 mb-3">
                        <textarea id="editBio" class="form-control" placeholder="Bio"></textarea>
                        </div>

                        <div class="col-md-6 mb-3">
                            <input type="text" id="editCity" class="form-control" placeholder="City">
                        </div>

                    </div>

                </div>

                <div class="modal-footer">

                    <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>

                </div>

            </div>

        </div>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function saveProfile() {

            let first = document.getElementById("editFirstName").value
            let last = document.getElementById("editLastName").value
            let email = document.getElementById("editEmail").value
            let phone = document.getElementById("editPhone").value
            let bio = document.getElementById("editBio").value
            let city = document.getElementById("editCity").value


            document.getElementById("firstName").innerText = first
            document.getElementById("lastName").innerText = last
            document.getElementById("email").innerText = email
            document.getElementById("phone").innerText = phone
            document.getElementById("bio").innerText = bio
            document.getElementById("city").innerText = city
            


            document.getElementById("name").innerText = first + " " + last
            document.getElementById("role").innerText = bio + " | " + city

        }
    </script>

</body>
</html>
