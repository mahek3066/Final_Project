<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Admin Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f6f9;
}

.container{
display:flex;
height:100vh;
}

.sidebar{
width:230px;
background:#2c3e50;
color:white;
padding:20px;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
padding:12px;
cursor:pointer;
border-radius:5px;
margin-bottom:5px;
}

.sidebar ul li:hover,
.sidebar .active{
background:#34495e;
}

.main{
flex:1;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.header input{
padding:8px;
width:200px;
border-radius:5px;
border:1px solid #ccc;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card h3{
margin-bottom:10px;
}

.table-section{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

table th, table td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

</style>
</head>


<body>

<div class="container">

<div class="sidebar">

<h2>College Admin</h2>

<ul>
    <li class="active">Dashboard</li>
    <li>Students</li>
    <li>Teachers</li>
    <li>Courses</li>
    <li>Fees</li>
    <li>Results</li>
    <li>Settings</li>
    <li  id="writeBlog">Write Blog</li>
    <li>Logout</li>
</ul>

</div>


<div class="main">

<div class="header">
<h2>Dashboard</h2>
<input type="text" placeholder="Search...">
</div>


<div class="cards">

<div class="card">
<h3>Students</h3>
<p id="students">1200</p>
</div>

<div class="card">
<h3>Teachers</h3>
<p id="teachers">85</p>
</div>

<div class="card">
<h3>Courses</h3>
<p id="courses">35</p>
</div>

<div class="card">
<h3>Fees Collected</h3>
<p id="fees">₹8,50,000</p>
</div>

</div>


<div class="table-section">

<h3>Recent Students</h3>

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Course</th>
<th>Status</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

</div>

</div>

</div>


<script>

    const students = [
        { id: 101, name: "Rahul Patel", course: "BCA", status: "Active" },
        { id: 102, name: "Amit Shah", course: "BBA", status: "Active" },
        { id: 103, name: "Priya Sharma", course: "MBA", status: "Pending" },
        { id: 104, name: "Neha Verma", course: "BSc IT", status: "Active" },
        { id: 105, name: "Rohit Kumar", course: "BCom", status: "Inactive" }
    ];

    let table = document.getElementById("studentTable");

    students.forEach(student => {

        let row = `
<tr>
<td>${student.id}</td>
<td>${student.name}</td>
<td>${student.course}</td>
<td>${student.status}</td>
</tr>
`;

        table.innerHTML += row;

    });
 
document.getElementById('writeBlog').addEventListener('click', () => {
            window.open('blogs.html', '_blank');
});


</script>

</body>
</html>
