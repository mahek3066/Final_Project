<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link href="css/deshboard.css" rel="stylesheet" />
</head>

<body>
    <!--header wil load heare-->
    <div id="header-container"></div>

    <!-- Navbar -->
    <div id="navbar"></div>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2" id="sidebar"></div>
            <!-- Main Content -->
            <div class="col-md-10 p-4" id="main-content">

                <h3 class="mb-4">Dashboard Overview</h3>

                <div class="row g-4">


                    <!-- Card 1 -->
                    <div class="col-md-3">
                        <div class="card p-3 text-center">
                            <div class="icon-box">
                                <i class="fa fa-users"></i>
                            </div>
                            <h4 id="photoCount">0</h4>
                            <p>Total User</p>
                        </div>
                    </div>

                    <!-- Card 2 -->
                    <div class="col-md-3">
                        <div class="card p-3 text-center">
                            <div class="icon-box">
                                <i class="fa-solid fa-user-graduate"></i>
                            </div>
                            <h4 id="userCount">0</h4>
                            <p>Total Students</p>
                        </div>
                    </div>

                </div>

                <!-- Table -->
                <div class="card mt-5">
                    <div class="card-header bg-white">
                        <h5>Recent Activity</h5>
                    </div>

                    <div class="card-body">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="activityTable"></tbody>
                        </table>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <!--footer-->
    <div id="footer-container"></div>

    <script src="js/include.js"></script>
    <script src="../js/College_Admin.js"></script>
    <script src="../js/Admin_Gallery.js"></script>
    <script src="../js/StudentEvent.js"></script>

    <script>

        let activities = JSON.parse(localStorage.getItem("activities")) || [];

        function loadActivities() {

            let table = document.getElementById("activityTable");
            table.innerHTML = "";

            activities.forEach((act, index) => {

                let row = `
                                      <tr>
                                      <td>${index + 1}</td>
                                      <td>${act.name}</td>
                                      <td><span class="badge bg-${act.statusColor}">${act.status}</span></td>
                                      </tr>
                                    `;

                table.innerHTML += row;

            });
        }

        function addActivity(name, status, statusColor) {

            let activity = {
                name: name,
                status: status,
                statusColor: statusColor
            };

            activities.push(activity);

            localStorage.setItem("activities", JSON.stringify(activities));

            loadActivities();
        }

        loadActivities();

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
