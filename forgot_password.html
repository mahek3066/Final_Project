<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: 'Oswald', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3d59, #2a7f62);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #ffffff;
            border-radius: 14px;
            padding: 35px 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        }

            .login-card h3 {
                color: #1e3d59;
                font-weight: 700;
                text-align: center;
            }

            .login-card p {
                color: #2a7f62;
                font-size: 14px;
                text-align: center;
            }

        .form-label {
            font-weight: 500;
            color: #1e3d59;
        }

        .input-group {
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            transition: 0.2s;
        }

        .input-group-text {
            background: #eaf6ff;
            border: none;
            color: #1e3d59;
            padding: 0 14px;
        }

        .form-control {
            border: none;
            padding: 12px;
        }

            .form-control:focus {
                box-shadow: none;
            }

        .input-group:has(input:focus) {
            border: 2px solid #2a7f62;
            box-shadow: 0 0 0 0.15rem rgba(42,127,98,0.25);
        }

        .btn-login {
            background: linear-gradient(135deg, #1e3d59, #3a6ea5);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 12px;
            border-radius: 8px;
        }

            .btn-login:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 25px rgba(0,0,0,0.25);
                color: #fff !important;
            }

        .back-link {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }

            .back-link a {
                color: #2a7f62;
                text-decoration: none;
            }

        .error-text {
            color: #f00f !important;
            font-size: 13px;
            margin-top: 5px;
            text-align:left !important;
            display: none;
           
        }

        
    </style>
</head>
<body>
   
    <div class="login-card">
        <div class="text-center mb-4">
            <h3>Forgot Password</h3>
            <p>Smt. K. B. Parekh College of Computer Science</p>
        </div>

        <form id="forgotForm">
            <div class="mb-3">
                <label class="form-label">Registered Email Address</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="text" id="email" class="form-control" placeholder="Enter your email">
                </div>
                <!-- Error message below input, left-aligned -->
                <p id="errorMsg" class="error-text"></p>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-login">
                    Reset Password
                </button>
            </div>



            <div class="back-link">
                <a href="Admin_login.html">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
            </div>
        </form>
    </div>
    
    <script>
        const form = document.getElementById("forgotForm");
        const errorMsg = document.getElementById("errorMsg");

       
        form.addEventListener("submit", async function (e) {

            e.preventDefault();

            const email = document.getElementById("email").value.trim();

            errorMsg.style.display = "none";

            if (email === "") {
                errorMsg.innerText = "Email is required";
                errorMsg.style.display = "block";
                return;
            }
            

            // Email format regex
                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!emailPattern.test(email)) {
             errorMsg.innerText = "Please enter a valid email address";
             errorMsg.style.display = "block";
              return;
                }


            try {

                const response = await fetch("https://localhost:7121/api/Login/forgot-password", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        email: email
                    })
                });

                const result = await response.json();

                console.log("API Response:", result); // DEBUG
                console.log("API result:", result);
                // =============================
                // CASE 1: Backend RETURNS token
                // =============================
                if (response.ok && result.resetToken) {

                    const token = result.resetToken;

                    window.location.href =
                        `reset_password.html?email=${encodeURIComponent(email)}&token=${encodeURIComponent(token)}`;

                } else if (response.ok) {

                    alert("Reset link sent to your email. Please check your inbox.");

                } else {

                    errorMsg.innerText = result.message || "Email not found";
                    errorMsg.style.display = "block";
                }
            }

            catch (error) {

                console.error("Error:", error);

                errorMsg.innerText = "Server error. Please try again.";
                errorMsg.style.display = "block";
            }
            
        });
    </script>
</body>
</html>
