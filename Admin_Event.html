<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Gallery</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background: #f5f7fa;
        }

        .header {
            background: #2c4a63;
            color: white;
            padding: 20px;
            border-radius: 10px;
        }

        .card img {
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>

<body>

    <div class="container mt-4">

        <div class="header d-flex justify-content-between align-items-center">
            <h3><i class="fa fa-camera"></i> Admin Gallery</h3>
            <button class="btn btn-light" data-bs-toggle="modal" data-bs-target="#addModal">
                + Add Photo
            </button>
        </div>

        <div class="row mt-4" id="cardContainer"></div>

    </div>

    <!-- MODAL -->
    <div class="modal fade" id="addModal">
        <div class="modal-dialog">
            <div class="modal-content p-3">

                <h5>Add Event</h5>

                <input type="date" id="date" class="form-control mb-2">

                <select id="section" class="form-control mb-2">
                    <option value="nss">NSS Event</option>
                    <option value="college">College Event</option>
                    <option value="student">Student Event</option>
                </select>

                <input type="file" id="image" class="form-control mb-2">

                <img id="preview" class="img-fluid mb-2" style="display:none; height:150px; object-fit:cover;">

                <button onclick="addData()" class="btn btn-primary">Save</button>

            </div>
        </div>
    </div>

    <script>

        document.getElementById("image").addEventListener("change", function (e) {
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.onload = function () {
                document.getElementById("preview").src = reader.result;
                document.getElementById("preview").style.display = "block";
            }

            if (file) {
                reader.readAsDataURL(file);
            }
        });

        function addData() {
            const date = document.getElementById("date").value;
            const section = document.getElementById("section").value;
            const file = document.getElementById("image").files[0];

            if (!date || !file) {
                alert("Fill all fields!");
                return;
            }

            const reader = new FileReader();

            reader.onload = function () {
                const imageData = reader.result;

                let data = JSON.parse(localStorage.getItem("eventsData")) || [];

                data.push({
                    date: date,
                    image: imageData,
                    section: section
                });

                localStorage.setItem("eventsData", JSON.stringify(data));

                displayData();
                location.reload();
            };

            reader.readAsDataURL(file);
        }

        function displayData() {
            const container = document.getElementById("cardContainer");
            container.innerHTML = "";

            let data = JSON.parse(localStorage.getItem("eventsData")) || [];

            data.forEach((item, index) => {
                container.innerHTML += `
            <div class="col-md-4">
                <div class="card shadow mb-4">
                    <img src="${item.image}" class="card-img-top">
                    <div class="card-body">
                        <h6>${item.section.toUpperCase()}</h6>
                        <p>${item.date}</p>

                        <button onclick="deleteData(${index})" class="btn btn-danger btn-sm">
                            <i class="fa fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
            `;
            });
        }

        function deleteData(index) {
            let data = JSON.parse(localStorage.getItem("eventsData"));
            data.splice(index, 1);
            localStorage.setItem("eventsData", JSON.stringify(data));
            displayData();
        }

        window.onload = displayData;

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
