<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Admin Panel - Time Table Management</title>
    <link rel="stylesheet" href="TTupload.css">
   
</head>
<body>

    <div class="header">
        <h1>Admin Time Table Panel</h1>
        <div class="button-group">
            <button class="add-tt-btn" onclick="openUploadModal()">+ Add New Time Table</button>
            <a href="timetable.html" class="header-btn header-btn-secondary">Back To Page</a>
        </div>
    </div>

    <div class="container">
        <div class="uploaded-list">
            <h3>📋 Uploaded Time Tables</h3>
            <div id="uploadedItems">
            </div>
        </div>
    </div>
    
    <div id="uploadModal" class="modal">
        <div class="modal-content-form">
            <span class="close" onclick="closeUploadModal()">&times;</span>
            <h2 style="margin-bottom: 20px; color: #1e3d59;">📤 Upload Time Table</h2>

            <div class="form-group">
                <label>Time Table Name:</label>
                <input type="text" id="timetableName" placeholder="e.g. BCA Sem-4 2026">
                <div class="field-error" id="nameError">Name is required!</div>
            </div>

            <div class="form-group">
                <label>Select PDF File:</label>
                <input type="file" id="timetableFile" accept="application/pdf">
                <div class="field-error" id="fileError">Please select a valid PDF!</div>
            </div>

            <div class="button-group" style="margin-top: 25px;">
                <button class="upload-btn" onclick="uploadTimetable()">Upload Now</button>
            </div>
        </div>
    </div>

    <div id="viewModal" class="modal">
        <div class="modal-content" style="height: 85%; width: 90%;">
            <span class="close" onclick="closeViewModal()">&times;</span>
            <h2 id="modalTitle"></h2>
            <iframe id="pdfViewer" style="width:100%; height:90%; border:none;"></iframe>
        </div>
    </div>

    <div id="deleteModal" class="modal">
        <div class="confirm-box">
            <h3>Delete Time Table?</h3>
            <p>This action cannot be undone.</p>
            <div class="confirm-btns">
                <button class="btn-yes" id="confirmDeleteBtn">Delete</button>
                <button class="btn-no" onclick="closeDeleteModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let timetables = JSON.parse(localStorage.getItem('timetables')) || [];
        let currentDeleteId = null;

        document.addEventListener('DOMContentLoaded', loadTimetables);

        // Modal Control Functions
        function openUploadModal() {
            resetForm();
            document.getElementById('uploadModal').style.display = 'flex';
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').style.display = 'none';
        }

        function closeViewModal() {
            document.getElementById('viewModal').style.display = 'none';
            document.getElementById('pdfViewer').src = "";
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').style.display = 'none';
        }

        // Upload Logic
        function uploadTimetable() {
            const nameInput = document.getElementById('timetableName');
            const fileInput = document.getElementById('timetableFile');
            const name = nameInput.value.trim();
            const file = fileInput.files[0];
            let hasError = false;

            if (!name) {
                nameInput.classList.add('error-border');
                document.getElementById('nameError').style.display = 'block';
                hasError = true;
            }
            if (!file || file.type !== "application/pdf") {
                fileInput.classList.add('error-border');
                document.getElementById('fileError').style.display = 'block';
                hasError = true;
            }

            if (hasError) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                const newItem = {
                    id: Date.now(),
                    name: name,
                    date: new Date().toLocaleDateString(),
                    pdf: e.target.result
                };

                timetables.unshift(newItem);
                localStorage.setItem('timetables', JSON.stringify(timetables));
                loadTimetables();
                closeUploadModal();
            };
            reader.readAsDataURL(file);
        }

        // Table Render Logic
        function loadTimetables() {
            const listDiv = document.getElementById('uploadedItems');
            if (timetables.length === 0) {
                listDiv.innerHTML = '<p style="text-align:center; padding:30px; color:#999;">No files uploaded.</p>';
                return;
            }

            let html = `
                        <table class="tt-table">
                            <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

            timetables.forEach(t => {
                html += `
                            <tr>
                                <td><span class="pdf-icon">📄</span><b>${t.name}</b></td>
                                <td>${t.date}</td>
                                <td>
                                    <button class="view-btn" onclick="viewPDF(${t.id})">View</button>
                                    <button class="delete-btn" onclick="showDeleteConfirm(${t.id})">Delete</button>
                                </td>
                            </tr>
                        `;
            });

            html += `</tbody></table>`;
            listDiv.innerHTML = html;
        }

        function viewPDF(id) {
            const item = timetables.find(t => t.id === id);
            if (item) {
                document.getElementById('modalTitle').innerText = item.name;
                document.getElementById('pdfViewer').src = item.pdf;
                document.getElementById('viewModal').style.display = 'flex';
            }
        }

        function showDeleteConfirm(id) {
            currentDeleteId = id;
            document.getElementById('deleteModal').style.display = 'flex';
        }

        document.getElementById('confirmDeleteBtn').onclick = function () {
            timetables = timetables.filter(t => t.id !== currentDeleteId);
            localStorage.setItem('timetables', JSON.stringify(timetables));
            loadTimetables();
            closeDeleteModal();
        };

        function resetForm() {
            document.getElementById('timetableName').value = '';
            document.getElementById('timetableFile').value = '';
            document.querySelectorAll('.field-error').forEach(el => el.style.display = 'none');
            document.querySelectorAll('input').forEach(el => el.classList.remove('error-border'));
        }

        // Outside click close
        window.onclick = function (event) {
            if (event.target.className === 'modal') {
                closeUploadModal();
                closeViewModal();
                closeDeleteModal();
            }
        }
    </script>
</body>
</html>
