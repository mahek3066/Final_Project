<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty of BCA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="FacultyPage.css">
</head>

<body>

    <!-- Header will load here -->
    <div id="header-container"></div>
    <div class="head text-center position-relative">
        <div class="header-content">
            <h1>Professor of Computer Science</h1>
            <p>Meet Our Faculty</p>
        </div>

    </div>

    <div class="container my-4">
        <div class="row g-3 justify-content-center">

            <div class="col-md-5 col-lg-4">
                <input type="text" class="form-control" id="searchInput" placeholder="Search by name..." onkeyup="filterFaculty()">
            </div>

            <div class="col-md-5 col-lg-4">
                <select id="deptFilter" class="form-select" onchange="filterFaculty()">
                    <option value="All">All Departments</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Software engineering">Software engineering</option>
                    <option value="IT application">IT application</option>
                    <option value="Skill">Skill</option>
                    <option value="Mathematics">Mathematics</option>
                </select>
            </div>

        </div>
    </div>

    <!-- ✅ Bootstrap Grid -->
    <div class="container">
        <div class="row" id="facultyGrid"></div>
    </div>
    <!-- Footer will load here -->
    <div id="footer-container"></div>
    <!-- JS -->
    <script src="script.js"></script>
    <script>
        let facultyData = JSON.parse(localStorage.getItem("facultyData")) || [];
        const grid = document.getElementById("facultyGrid");

        function displayFaculty(data) {
            grid.innerHTML = "";

            if (data.length === 0) {
                grid.innerHTML = "<p class='text-center'>No faculty found.</p>";
                return;
            }

            data.forEach(member => {
                const col = document.createElement("div");
                col.className = "col-md-6 col-lg-4 mb-4";

                const imgSrc = member.image || "https://via.placeholder.com/150";

                col.innerHTML = `
                <div class="faculty-card">
                    <img src="${imgSrc}" class="faculty-img" alt="${member.name}">
                    <h3>${member.name}</h3>
                    <p><strong>${member.designation}</strong></p>
                    <p>${member.department}</p>

                    <div class="desc-container">
                        <p class="desc-text" id="desc-${member.id}">${member.description}</p>
                        <button class="toggle-btn" onclick="toggleDesc(${member.id})">More</button>
                    </div>

                    <a href="mailto:${member.email}" class="btn btn-primary mt-2">Email</a>
                        <div class="social-icons">
                        <a href="#"><i class="fab fa-facebook"></i></a>
                        <a href="#"><i class="fab fa-instagram"></i></a>
                        <a href="#"><i class="fab fa-linkedin"></i></a>
                        </div>

                </div>
            `;

                grid.appendChild(col);
            });
        }

        function toggleDesc(id) {
            const descElement = document.getElementById(`desc-${id}`);
            const btn = descElement.nextElementSibling;

            descElement.classList.toggle("expanded");
            btn.textContent = descElement.classList.contains("expanded") ? "Less" : "More";
        }

        function filterFaculty() {
            const text = document.getElementById("searchInput").value.toLowerCase();
            const dept = document.getElementById("deptFilter").value;

            const filtered = facultyData.filter(f =>
                f.name.toLowerCase().includes(text) &&
                (dept === "All" || f.department === dept)
            );

            displayFaculty(filtered);
        }

        displayFaculty(facultyData);
    </script>

</body>
</html>
