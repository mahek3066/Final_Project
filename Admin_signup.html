<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup - Smt. K. B. Parekh College</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: 'Oswald', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3d59, #2a7f62);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: #fff;
            border-radius: 14px;
            padding: 35px 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        }

            .login-card h3 {
                color: #1e3d59;
                font-weight: 700;
                text-align: center;
            }

            .login-card p {
                color: #2a7f62;
                font-size: 14px;
                text-align: center;
                margin-bottom: 25px;
            }

        .input-group {
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .input-group-text {
            background: #eaf6ff;
            border: none;
            color: #1e3d59;
        }

        .form-control {
            border: none;
            padding: 12px;
        }

            .form-control:focus {
                box-shadow: none;
            }

        .input-group:has(input:focus) {
            border: 2px solid #2a7f62;
            box-shadow: 0 0 0 0.15rem rgba(42,127,98,0.25);
        }

        .error-text {
            color: red !important;
            font-size: 12px !important;
            margin-top: 5px;
            margin-bottom: 10px;
            text-align: left !important;
            display: none;
        }

        .btn-login {
            background: linear-gradient(135deg, #1e3d59, #3a6ea5);
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
        }

            .btn-login:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 25px rgba(0,0,0,0.25);
                color:white !important;
            }

        .login-footer {
            font-size: 13px;
            margin-top: 20px;
            text-align: center;
        }

            .login-footer a {
                color: #2a7f62;
                text-decoration: none;
                font-weight: 500;
            }

                .login-footer a:hover {
                    text-decoration: underline;
                }
    </style>
</head>
<body>

    <div class="login-card">
        <h3>Create Account</h3>
        <p>Sign up to access your account</p>

        <form id="signupForm" novalidate>

            <!-- Username -->
            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" id="username" class="form-control" placeholder="Username">
                </div>
                <p class="error-text" id="usernameError"></p>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" id="email" class="form-control" placeholder="Email Address">
                </div>
                <p class="error-text" id="emailError"></p>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="password" class="form-control" placeholder="Password">
                </div>
                <p class="error-text" id="passwordError"></p>
            </div>

            <!-- Confirm Password -->
            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password">
                </div>
                <p class="error-text" id="confirmPasswordError"></p>
            </div>

            <button type="submit" class="btn-login mt-2">Sign Up</button>
        </form>

        <div class="login-footer">
            <p class="mb-1">Authorized personnel only</p>
            <p class="mt-3">Already have an account? <a href="Admin_login.html">Login</a></p>
        </div>
    </div>

    <script>
        const form = document.getElementById("signupForm");

        const username = document.getElementById("username");
        const email = document.getElementById("email");
        const password = document.getElementById("password");
        const confirmPassword = document.getElementById("confirmPassword");

        const usernameError = document.getElementById("usernameError");
        const emailError = document.getElementById("emailError");
        const passwordError = document.getElementById("passwordError");
        const confirmPasswordError = document.getElementById("confirmPasswordError");

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const numberRegex = /[0-9]/;

        form.addEventListener("submit", function (e) {
            e.preventDefault();
            let isValid = true;

            // Username validation
            if (username.value.trim() === "") {
                usernameError.textContent = "Username is required";
                usernameError.style.display = "block";
                isValid = false;
            } else {
                usernameError.style.display = "none";
            }

            // Email validation
            if (email.value.trim() === "") {
                emailError.textContent = "Email is required";
                emailError.style.display = "block";
                isValid = false;
            } else if (!emailRegex.test(email.value)) {
                emailError.textContent = "Enter a valid email address";
                emailError.style.display = "block";
                isValid = false;
            } else {
                emailError.style.display = "none";
            }

            // Password validation
            if (password.value.trim() === "") {
                passwordError.textContent = "Password is required";
                passwordError.style.display = "block";
                isValid = false;
            } else if (password.value.length < 6) {
                passwordError.textContent = "Password must be at least 6 characters";
                passwordError.style.display = "block";
                isValid = false;
            } else if (!numberRegex.test(password.value)) {
                passwordError.textContent = "Password must contain at least one number";
                passwordError.style.display = "block";
                isValid = false;
            } else {
                passwordError.style.display = "none";
            }

            // Confirm password validation
            if (confirmPassword.value.trim() === "") {
                confirmPasswordError.textContent = "Please confirm your password";
                confirmPasswordError.style.display = "block";
                isValid = false;
            } else if (password.value !== confirmPassword.value) {
                confirmPasswordError.textContent = "Passwords do not match";
                confirmPasswordError.style.display = "block";
                isValid = false;
            } else {
                confirmPasswordError.style.display = "none";
            }

            if (isValid) {
                alert("Signup successful!");
                form.reset();
            }
        });

        // Remove error on typing
        [username, email, password, confirmPassword].forEach(input => {
            input.addEventListener("input", () => {
                document.getElementById(input.id + "Error").style.display = "none";
            });
        });
    </script>

</body>
</html>
