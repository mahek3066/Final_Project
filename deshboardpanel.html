<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link href="css/deshboard.css" rel="stylesheet">
</head>

<body>

    <!-- Header -->
    <div class="header d-flex justify-content-between align-items-center">

        <h4><i class="fa-solid fa-gauge"></i> Admin Dashboard</h4>

        <button class="btn btn-light btn-sm">
            <i class="fa fa-sign-out-alt"></i> Logout
        </button>

    </div>

    <div class="container-fluid">

        <div class="row">

            <!-- Sidebar -->

            <div class="col-md-2 sidebar">

                <ul class="nav flex-column">

                    <li class="nav-item">
                        <a href="#" class="nav-link active" onclick="loadPage('pages/homepanel.html')">
                            <i class="fa-solid fa-house"></i> Dashboard
                        </a>
                    </li>

                    <li>
                        <a href="#" onclick="loadPage('pages/blogs.html')">
                            <i class="fa-solid fa-blog"></i> Blogs
                        </a>
                    </li>

                    <li class="nav-item">

                        <a class="nav-link text-white" data-bs-toggle="collapse" href="#eventMenu">
                            <i class="fa-solid fa-calendar"></i> Events
                        </a>

                        <ul class="collapse list-unstyled ps-4" id="eventMenu">

                            <li>
                                <a href="#" onclick="loadPage('pages/nss.html')">
                                    NSS Event
                                </a>
                            </li>

                            <li>
                                <a href="#" onclick="loadPage('pages/student.html')">
                                    Student Event
                                </a>
                            </li>

                            <li>
                                <a href="#" onclick="loadPage('pages/college.html')">
                                    College Event
                                </a>
                            </li>

                        </ul>

                    </li>

                    <li>
                        <a href="#" onclick="loadPage('pages/sports.html')">
                            <i class="fa-solid fa-table-tennis-paddle-ball"></i> Sports
                        </a>
                    </li>

                    <li>
                        <a href="Adamin_gallery.html" onclick="loadPage('pages/Adamin_gallery.html')">
                            <i class="fa fa-image"></i> Gallery
                        </a>
                    </li>

                    <li>
                        <a href="#" onclick="loadPage('pages/faculty.html')">
                            <i class="fa fa-user"></i> Faculty
                        </a>
                    </li>

                    <li>
                        <a href="#" onclick="loadPage('pages/timetable.html')">
                            <i class="fa-solid fa-table"></i> Time Table
                        </a>
                    </li>

                    <li>
                        <a href="#" onclick="loadPage('pages/notice.html')">
                            <i class="fa-solid fa-file-lines"></i> Notice
                        </a>
                    </li>

                    <li>
                        <a href="#" onclick="loadPage('pages/settings.html')">
                            <i class="fa fa-cog"></i> Settings
                        </a>
                    </li>

                </ul>

            </div>

            <!-- Content Area -->

            <div class="col-md-10 p-4" id="content">

                <h3>Dashboard Overview</h3>

            </div>

        </div>

    </div>

    <script>

function loadPage(page){

fetch(page)
.then(res => res.text())
.then(data => {

document.getElementById("content").innerHTML = data;

});

}

loadPage("pages/home.html");

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
