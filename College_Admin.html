<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Gallery</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link href="../css/College_Admin.css" rel="stylesheet" />

</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <div>
            <h2><i class="fa-solid fa-camera"></i> College Event Admin Gallery</h2>
            <p>Manage your College Event gallery photos and covers</p>
        </div>
        <div>
            <button class="add-photo-btn" onclick="openModal()">+ Add Photo</button>
        </div>
    </div>

    <div class="container">

        <!-- TABLE -->
        <table class="table-grid">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Image</th>
                    <th>Caption</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="tableData"></tbody>
        </table>

    </div>

    <!-- ADD MODAL -->
    <div class="modal-custom" id="addModal">
        <div class="modal-box">

            <h4>Add Photo</h4>

            <input type="file" id="imgInput" class="form-control mb-2">
            <input type="text" id="captionInput" class="form-control mb-2" placeholder="Enter caption">

            <button class="btn btn-success" onclick="savePhoto()">Save</button>
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>

        </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal-custom" id="editModal">
        <div class="modal-box">

            <h4>Edit Photo</h4>

            <input type="hidden" id="editIndex">
            <img id="editImg" width="100" class="mb-2">

            <input type="text" id="editCaption" class="form-control mb-2">

            <button class="btn btn-success" onclick="updatePhoto()">Update</button>
            <button class="btn btn-secondary" onclick="closeEdit()">Cancel</button>

        </div>
    </div>

    <div class="modal-custom" id="deleteModal">
        <div class="modal-box text-center">
            <h4>Are you sure?</h4>
            <p>Delete this photo?</p>

            <button class="btn btn-danger" onclick="confirmDelete()">Yes</button>
            <button class="btn btn-secondary" onclick="closeDelete()">Cancel</button>
        </div>
    </div>
    <script>
        let galleryData = JSON.parse(localStorage.getItem("collegeGallery")) || [];
        let deleteIndex = null;

        window.onload = () => {
            displayData();
        };

        // Modal Functions
        function openModal() { document.getElementById('addModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('addModal').style.display = 'none'; }
        function closeEdit() { document.getElementById('editModal').style.display = 'none'; }
        function closeDelete() { document.getElementById('deleteModal').style.display = 'none'; }

        // Save Function
        function savePhoto() {
            const fileInput = document.getElementById('imgInput');
            const captionInput = document.getElementById('captionInput');

            if (!fileInput.files || !fileInput.files[0]) {
                alert("please choose photo!");
                return;
            }

            const reader = new FileReader();
            reader.onload = function (e) {
                const newPhoto = {
                    date: new Date().toLocaleDateString(),
                    image: e.target.result,
                    caption: captionInput.value || "No Caption"
                };
                galleryData.push(newPhoto);
                localStorage.setItem("collegeGallery", JSON.stringify(galleryData));
                displayData();
                closeModal();
                fileInput.value = "";
                captionInput.value = "";
            };
            reader.readAsDataURL(fileInput.files[0]);
        }

        // Display Function
        function displayData() {
            const tableBody = document.getElementById('tableData');
            tableBody.innerHTML = "";

            galleryData.forEach((item, index) => {
                tableBody.innerHTML += `
        <tr>
            <td class="col-date">${item.date}</td>
            <td class="col-img">
                <img src="${item.image}" width="75" height="50" style="object-fit:cover; border-radius:6px;">
            </td>
            <td class="col-caption">${item.caption}</td>
            <td class="col-action">
                <div class="btn-wrapper">
                    <button class="action-btn btn-edit" onclick="openEdit(${index})">
                        <i class="fa-solid fa-pen-to-square"></i>
                    </button>
                    <button class="action-btn btn-delete" onclick="openDelete(${index})">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                    <button class="action-btn btn-view" onclick="viewImage('${item.image}')">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </td>
        </tr>`;
            });
        }

        function viewImage(imgSrc) {
            localStorage.setItem("currentViewImage", imgSrc);
            window.location.href = "/pages/College_Event.html";
        }

        function openEdit(index) {
            const photo = galleryData[index];
            document.getElementById('editIndex').value = index;
            document.getElementById('editImg').src = photo.image;
            document.getElementById('editCaption').value = photo.caption;
            document.getElementById('editModal').style.display = 'flex';
        }

        function updatePhoto() {
            const index = document.getElementById('editIndex').value;
            galleryData[index].caption = document.getElementById('editCaption').value;
            localStorage.setItem("collegeGallery", JSON.stringify(galleryData));
            displayData();
            closeEdit();
        }

        function openDelete(index) {
            deleteIndex = index;
            document.getElementById('deleteModal').style.display = 'flex';
        }

        function confirmDelete() {
            if (deleteIndex !== null) {
                galleryData.splice(deleteIndex, 1);
                localStorage.setItem("collegeGallery", JSON.stringify(galleryData));
                displayData();
                closeDelete();
                deleteIndex = null;
            }
        }
    </script>
</body>
</html>
